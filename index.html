<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist Analysis</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      padding: 24px;
    }

      font-weight: 600;
      margin-bottom: 6px;
      color: #fff;

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 28px;
      font-size: 0.95rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .chart-box {
      background: #1a1d27;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #2a2d3a;
    }
    .chart-box.wide {
      grid-column: 1 / -1;
    }
    h2 {
      font-size: 0.95rem;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .chart { width: 100%; }
  </style>
</head>

const darkLayout = {

  margin: { t: 10, r: 10, b: 50, l: 50 },
  xaxis: { gridcolor: "#2a2d3a", zerolinecolor: "#2a2d3a" },
  yaxis: { gridcolor: "#2a2d3a", zerolinecolor: "#2a2d3a" },
  hoverlabel: {
    bgcolor: "#1e2130",

    font: { color: "#eee", size: 11 },
    align: "left",

const config = { responsive: true, displayModeBar: false };

// --- Year chart ---
Plotly.newPlot("chart-year", [{
  type: "bar",
  x: DATA.year.x,
  y: DATA.year.y,
  hovertext: DATA.year.text,
  hovertemplate: "<b>%{x}</b> — %{y} tracks<br><br>%{hovertext}<extra></extra>",
  marker: { color: "#4e9af1" },
}], {
  ...darkLayout,
  margin: { t: 10, r: 10, b: 40, l: 40 },
  bargap: 0.2,
}, config);

// --- Decade pie ---
Plotly.newPlot("chart-decade", [{
  type: "pie",
  labels: DATA.decade.labels,
  values: DATA.decade.values,
  hovertext: DATA.decade.text,
  hovertemplate: "<b>%{label}</b><br>%{value} tracks (%{percent})<br><br>%{hovertext}<extra></extra>",
  textinfo: "label+percent",
  hole: 0.35,
  marker: {
    colors: ["#e07b54","#e0b454","#7be07b","#54b4e0","#a07be0","#e07ba0","#7be0d4","#e0e07b"],

}], {
  ...darkLayout,

  showlegend: false,
}, config);

// --- Popularity histogram ---

  marker: { color: "#a07be0" },
}], {
  ...darkLayout,
  xaxis: {
    gridcolor: "#2a2d3a",

  yaxis: {
    gridcolor: "#2a2d3a",

}, config);

// --- Genre bar ---
